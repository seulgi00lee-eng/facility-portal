<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캠퍼스 시설지원 포털</title>
<style>
  :root{--ink:#1d1d1f;--ink2:#1d1d1f;--mute:#86868b;--mute2:#86868b;--line:#e8e8ed;--line2:#f0f0f2;--bg:#f5f5f7;--blue:#0071e3;--bluebg:#eef1f8;--ok:#248a3d;--okbg:#eaf7ee;--okln:#c4e8cf;--warn:#b06f00;--warnbg:#fff6e6;--warnln:#f3e2bd;--dng:#c72c22;--dngbg:#fdeeed;--dngln:#f5cfcb;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-h:0 8px 24px rgba(0,0,0,.10);--r:18px;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-.2px;}
  .wrap{max-width:1040px;margin:0 auto;background:var(--bg);min-height:100vh;}
  .hd{padding:26px 32px 0;background:#fff;}
  .hd h1{font-size:20px;font-weight:600;margin:0;letter-spacing:-.4px;}
  .hd p{font-size:13.5px;color:var(--mute);margin:4px 0 0;}
  .tabs{display:flex;gap:24px;margin-top:20px;background:#fff;}
  .tn{border:none;background:none;padding:0 0 14px;cursor:pointer;font-family:inherit;color:var(--mute);font-size:14px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:opacity .15s;}
  .tn.on{color:var(--ink);border-bottom-color:var(--ink);}
  .tn:hover{opacity:.55;}
  .hr{height:1px;background:var(--line);}
  .view{padding:28px 32px;min-height:440px;}
  .secttl{font-size:13px;color:var(--mute2);font-weight:600;letter-spacing:-.2px;margin:0 0 14px;}
  .hint{font-size:12px;color:var(--mute2);line-height:1.5;}
  .home-row{border:none;border-radius:var(--r);padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:13px;margin-bottom:10px;max-width:820px;background:#fff;box-shadow:var(--shadow);transition:opacity .15s;}
  .home-row:hover{opacity:.55;}
  .home-row .tt{font-size:14px;font-weight:600;}
  .home-row .ts{font-size:12px;color:var(--mute2);margin-top:2px;}
  .home-row .arr{margin-left:auto;color:#c5c5c8;font-size:16px;}
  .notice{border:none;border-radius:16px;padding:16px 20px;margin-bottom:26px;font-size:13.5px;color:var(--ink);background:#fff;box-shadow:var(--shadow);max-width:820px;display:flex;align-items:center;gap:12px;font-weight:500;}
  .notice::before{content:"";width:8px;height:8px;border-radius:50%;background:#ff3b30;flex:0 0 auto;}
  .gitem{border:2px solid transparent;border-radius:14px;padding:16px 16px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;color:var(--ink2);text-align:center;background:#fff;box-shadow:var(--shadow);transition:opacity .15s,border-color .15s;letter-spacing:-.2px;}
  .gitem:hover{opacity:.55;}
  .gitem.on{border-color:var(--blue);color:var(--blue);opacity:1;}
  .grid-g{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:720px;}
  .panel{border:none;border-radius:var(--r);margin-top:18px;overflow:hidden;max-width:720px;background:#fff;box-shadow:var(--shadow);}
  .ph{padding:18px 22px;font-size:17px;font-weight:600;border-bottom:1px solid var(--line2);background:#fff;letter-spacing:-.3px;}
  .pb{padding:18px 22px;}
  .step{padding:12px 0;border-bottom:1px solid var(--line2);}
  .step:last-child{border-bottom:none;}
  .lab{font-size:12px;font-weight:600;color:var(--blue);letter-spacing:-.1px;margin-bottom:7px;}
  .stx{font-size:14.5px;line-height:1.6;color:var(--ink2);letter-spacing:-.2px;}
  .vend{display:inline-block;border:1px solid var(--line);border-radius:5px;padding:2px 9px;font-size:12px;color:#5a5a5e;margin-top:7px;}
  .subtab{display:inline-flex;background:#eef0f2;border-radius:11px;padding:3px;margin-bottom:22px;gap:2px;}
  .stb{border:none;background:none;padding:9px 20px;font-size:13.5px;font-weight:500;color:var(--mute);cursor:pointer;font-family:inherit;border-radius:8px;transition:opacity .15s;}
  
  .stb.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .grid-i{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:760px;}
  .item{border:2px solid transparent;border-radius:14px;padding:16px 10px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:var(--ink2);text-align:center;background:#fff;box-shadow:var(--shadow);transition:opacity .15s,border-color .15s;}
  .item:hover{opacity:.55;}
  .item.on{border-color:var(--blue);color:var(--blue);opacity:1;}
  .lbl{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
  .num{display:inline-flex;width:18px;height:18px;border-radius:6px;background:var(--bluebg);color:var(--blue);font-size:10.5px;align-items:center;justify-content:center;font-weight:600;}
  .fb{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:500;color:var(--ink2);cursor:pointer;font-family:inherit;transition:opacity .15s;}
  .fb.on{background:var(--blue);color:#fff;border-color:var(--blue);}
  .fbtns{display:flex;gap:8px;margin-bottom:13px;flex-wrap:wrap;}
  input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink);box-sizing:border-box;letter-spacing:-.2px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.12);}
  .pill{display:inline-block;border:1px solid var(--line);background:var(--bg);color:var(--mute);font-size:11.5px;padding:3px 11px;border-radius:5px;font-weight:500;}
  .submit{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:13px 22px;font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s;letter-spacing:-.2px;}
  .submit:hover{opacity:.8;}
  .submit:active{opacity:.65;}
  .dd{margin-bottom:13px;}
  .ddh{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;background:#fff;transition:opacity .15s;}
  .ddh.has{border-color:var(--blue);}
  .ddh .left{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2);min-width:0;}
  .cur.sel{color:var(--ink);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cur.ph{color:#a5a5a8;}
  .chev{color:#b5b5b8;font-size:12px;}.dd.open .chev{transform:rotate(180deg);}
  .ddbody{display:none;border:1px solid var(--line);border-top:none;border-radius:0 0 6px 6px;margin-top:-1px;padding:8px;flex-wrap:wrap;gap:6px;}
  .dd.open .ddbody{display:flex;}
  .optb{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:12.5px;cursor:pointer;color:var(--ink2);font-family:inherit;transition:opacity .15s;}
  .optb.on{background:var(--blue);color:#fff;border-color:var(--blue);}
  .row2{display:flex;gap:12px;}.row2>div{flex:1;}
  .fld{margin-bottom:13px;}
  .statusbox{border:none;border-radius:var(--r);padding:18px 20px;background:#fff;box-shadow:var(--shadow);}
  .sbi{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line2);font-size:12.5px;gap:12px;}
  .sbi:last-of-type{border-bottom:none;}
  .sbi .k{color:#7a7a7e;flex:0 0 auto;}
  .v-wait{color:var(--mute2);font-size:12px;}
  .v-set{color:var(--ink);font-size:12px;font-weight:500;text-align:right;}
  .v-done{color:var(--ok);font-size:12px;font-weight:600;}
  .twocol{display:grid;grid-template-columns:1.2fr 1fr;gap:26px;align-items:start;}
  .card{border:1px solid var(--line);border-radius:8px;margin-bottom:10px;overflow:hidden;}
  .ch{padding:12px 15px;display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:1px solid var(--line2);}
  .ch .title{font-size:15px;font-weight:600;}
  .ch .rid{font-size:12.5px;color:#a5a5a8;margin-top:3px;}
  .badge{font-size:12px;padding:4px 11px;border-radius:6px;font-weight:600;border:1px solid var(--line);}
  .mlhead{transition:background .12s;}.mlhead:hover{background:var(--line2);}
  .mlcard .ch{padding:14px 17px;}
  .b-wait{color:var(--mute);background:#f0f0f2;}.b-prog{color:var(--warn);background:var(--warnbg);border-color:var(--warnln);}.b-done{color:var(--ok);background:var(--okbg);border-color:var(--okln);}
  .ttag{font-size:10.5px;padding:1px 8px;border-radius:4px;font-weight:500;margin-right:7px;border:1px solid var(--line);color:#7a7a7e;background:var(--bg);}
  .cbody{padding:6px 15px 12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 22px;}
  .filt{display:flex;gap:6px;margin-bottom:16px;}
  .flt{border:1px solid var(--line);background:#fff;border-radius:6px;padding:6px 13px;font-size:12.5px;font-weight:500;color:var(--mute);cursor:pointer;font-family:inherit;}
  .flt.on{background:var(--blue);color:#fff;border-color:var(--blue);}
  .ecode{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:12.5px;font-weight:500;color:var(--ink2);cursor:pointer;font-family:inherit;transition:opacity .15s;}
  .ecode:hover{opacity:.6;}.ecode.on{background:var(--blue);color:#fff;border-color:var(--blue);opacity:1;}
  .infogrid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
  @media(max-width:760px){.wrap{max-width:100%;border:none}.twocol,.infogrid{grid-template-columns:1fr}.grid-g,.grid-i{grid-template-columns:1fr 1fr}.cbody{grid-template-columns:1fr}.view,.hd{padding-left:18px;padding-right:18px}.tn{padding:9px 11px}}

  .ovl{position:fixed;inset:0;background:rgba(20,20,22,.42);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .ovl.show{display:flex;}
  .modal{background:#fff;border:none;border-radius:20px;max-width:440px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.22);}
  .mh{padding:16px 20px;border-bottom:1px solid var(--line);font-size:14px;font-weight:600;}
  .mb{padding:16px 20px;}
  .mrow{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid var(--line2);font-size:13px;}
  .mrow:last-child{border-bottom:none;}
  .mrow .mk{color:#8a8a8e;flex:0 0 38%;}
  .mrow .mv{color:var(--ink);font-weight:500;text-align:right;word-break:break-word;}
  .mq{font-size:14px;font-weight:600;text-align:center;margin:16px 0 4px;}
  .mf{display:flex;gap:10px;padding:14px 20px 18px;}
  .mbtn{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--line);transition:opacity .15s;}
  .mbtn.no{background:#fff;color:var(--ink2);}
  .mbtn.yes{background:var(--blue);color:#fff;border-color:var(--blue);}
  .gate{max-width:360px;}
  .done-ic{width:46px;height:46px;border-radius:50%;background:var(--okbg);border:1px solid var(--okln);color:var(--ok);display:flex;align-items:center;justify-content:center;font-size:22px;margin:4px auto 10px;}

  .home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:820px;}
  .hcard{border:none;border-radius:var(--r);padding:22px 20px;cursor:pointer;text-align:left;background:#fff;box-shadow:var(--shadow);transition:opacity .15s;display:flex;flex-direction:column;gap:0;font-family:inherit;}
  .hcard:hover{opacity:.55;}
  .hcard:active{opacity:.4;}
  .hcard .hnum{font-size:11px;color:var(--blue);font-weight:600;margin-bottom:12px;letter-spacing:0;}
  .hcard .htt{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:5px;line-height:1.35;letter-spacing:-.3px;}
  .hcard .hts{font-size:13px;color:var(--mute2);line-height:1.5;}
  @media(max-width:760px){.home-grid{grid-template-columns:1fr 1fr;}}
  @media(max-width:480px){.home-grid{grid-template-columns:1fr;}}

  /* 로그인 게이트 */
  .gate-ovl{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
  .gate-card{background:#fff;border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.10);width:100%;max-width:400px;padding:36px 32px;}
  .gate-card h2{font-size:22px;font-weight:600;letter-spacing:-.4px;margin:0 0 6px;}
  .gate-card .sub{font-size:13.5px;color:var(--mute);margin:0 0 26px;}
  .gate-seg{display:flex;background:#eef0f2;border-radius:11px;padding:3px;margin-bottom:22px;}
  .gate-seg button{flex:1;border:none;background:none;padding:9px;font-size:13.5px;font-weight:500;color:var(--mute);cursor:pointer;font-family:inherit;border-radius:8px;transition:opacity .15s;}
  .gate-seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .gate-fld{margin-bottom:14px;}
  .gate-fld label{font-size:12.5px;font-weight:600;color:var(--ink2);display:block;margin-bottom:6px;}
  .gate-hint{font-size:12px;color:var(--mute2);line-height:1.5;margin-top:6px;}
  .gate-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:opacity .15s;}
  .gate-btn:hover{opacity:.85;}
  .gate-btn:disabled{opacity:.5;cursor:default;}
  .gate-msg{font-size:12.5px;margin-top:12px;padding:10px 12px;border-radius:9px;line-height:1.5;}
  .gate-msg.err{background:var(--dngbg);color:var(--dng);border:1px solid var(--dngln);}
  .gate-msg.ok{background:var(--okbg);color:var(--ok);border:1px solid var(--okln);}
  .acctbar{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--mute);}
  .acctbar b{color:var(--ink);font-weight:600;}
  .acctbar .logout{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 12px;font-size:12px;color:var(--ink2);cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="gate-ovl" id="gate">
  <div class="gate-card">
    <h2>캠퍼스 시설지원 포털</h2>
    <p class="sub">플로우교육 총무기획팀</p>
    <div class="gate-seg"><button id="seg-login" class="on" onclick="gateMode('login')">로그인</button><button id="seg-signup" onclick="gateMode('signup')">가입 신청</button></div>
    <div id="gate-body"></div>
  </div>
</div>
<div id="app" style="display:none">
<div class="wrap">
  <div class="hd"><h1>캠퍼스 시설지원 포털</h1><p>고장·견적·접수를 현장에서 바로 해결</p><div class="tabs" id="tabs"></div></div>
  <div class="hr"></div>
  <div class="view" id="view"></div>
</div>
</div>
<div class="ovl" id="ovl"><div class="modal" id="modal"></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== Supabase 연결 =====
var SB_URL="https://gegrylivlqxwcobnuwie.supabase.co";
var SB_KEY="sb_publishable_PInNA4d_JkTn4_U1QeI1RQ_vCz2HFyV";
var sb=(window.supabase&&window.supabase.createClient)?window.supabase.createClient(SB_URL,SB_KEY):null;
var SB_READY=!!sb;
// ===== 알림 채널 (n8n + Gmail) =====
// n8n Webhook URL — 배포 후 실제 URL로 교체 (예: https://n8n.flowedu.co.kr/webhook/fac-notify)
var N8N_NOTIFY_URL="https://seulgi00lee.app.n8n.cloud/webhook/fac-notify";
// n8n으로 알림 발송 요청. type: 'received'(접수완료) | 'progress'(진행업데이트)
function n8nNotify(payload){
  if(N8N_NOTIFY_URL.indexOf('YOUR-N8N-HOST')>-1)return Promise.resolve({ok:false,error:'n8n_url_not_set'});
  return fetch(N8N_NOTIFY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    .then(function(r){return r.json().catch(function(){return {ok:r.ok};});})
    .catch(function(e){return {ok:false,error:String(e)};});
}
// 캠퍼스(지역)/건물/층 캐시
var CAMPUS_CACHE=null, BLD_CACHE={}, FLR_CACHE={};
var GUIDE={
  led:{t:"전등·조명",req:"전등 및 조명",detail:"[전등·조명] 안 켜짐/깜빡임 증상. 스위치 확인으로 해결 안 됨.",s:[[1,"안 켜지거나 일부만 안 들어오면, 스위치를 껐다 켜며 다시 확인하고 다른 등은 들어오는지 같이 확인하세요. 깜빡임·어두움은 육안 확인만 하세요.",""],[2,"감전 위험 + 천장 높은 곳 작업이라 등·안정기·전선 교체는 직접 하지 마세요.",""],[3,"스위치 확인으로 안 되면 호실·등 개수를 적어 접수. 등 교체 또는 안정기·컨버터 교체가 필요합니다. (예상 비용 약 5만원, 등 개수·천장 높이에 따라 증가 / VAT 별도·참고용)","노르웨이숲"]]},

function boardPanel(){return '<div class="panel"><div class="ph">칠판 — 예상 견적</div><div class="pb"><div class="hint" style="margin-bottom:11px">칠판 가로(mm)·수량을 넣으면 예상 금액(VAT 포함)이 바로 나옵니다.</div><div style="display:flex;gap:12px;max-width:400px"><div style="flex:1.4"><div class="lbl">칠판 가로(mm)</div><input id="w" type="number" placeholder="예: 3000"></div><div style="flex:.7"><div class="lbl">수량</div><input id="q" type="number" value="1" min="1"></div></div><div class="hint" id="seg" style="min-height:16px;margin:9px 0;color:#5a5a5e"></div><div style="border:1px solid var(--line);border-radius:7px;padding:13px 16px;display:flex;justify-content:space-between;align-items:baseline;max-width:400px"><span style="font-size:13px;color:#7a7a7e">예상 합계 (VAT 포함)</span><span id="grand" style="font-size:20px;font-weight:600">0 원</span></div><div class="hint" style="margin-top:9px">과거 견적·납품 단가 기반 참고용 추정치. 실제 금액은 업체 견적 후 확정(설치비 별도).</div><button class="submit" style="margin-top:14px" onclick="submitBoard()">구매 신청하기</button></div></div>';}
function bindBoard(){function tier(w){for(var i=0;i<TIERS.length;i++){if(w<=TIERS[i][0])return TIERS[i];}return null;}function val(id){return document.getElementById(id).value;}function calc(){var w=Number(val('w')),q=Math.max(1,Number(val('q'))||1);var seg=document.getElementById('seg');var s=0;if(w>0){var t=tier(w);if(t){s=t[1]*q;seg.textContent='구간 '+t[2]+' · '+t[1].toLocaleString()+'원/개 × '+q+'개';}else seg.textContent='5400mm 초과 — 별도 견적';}else seg.textContent='';document.getElementById('grand').textContent=Math.round(s*1.1).toLocaleString()+' 원';}['w','q'].forEach(function(id){document.getElementById(id).addEventListener('input',calc);});}


// ===== Supabase 실시간 조회 =====
// 지역(캠퍼스) 목록 로드 → campus 드롭다운 옵션 채움
function loadCampuses(cb){
  if(!SB_READY){if(cb)cb([]);return;}
  if(CAMPUS_CACHE){if(cb)cb(CAMPUS_CACHE);return;}
  sb.from('fac_campus_master').select('region').then(function(res){
    var rows=(res&&res.data)||[];
    var set={},list=[];
    rows.forEach(function(r){if(r.region&&!set[r.region]){set[r.region]=1;list.push(r.region);}});
    list.sort();
    CAMPUS_CACHE=list;
    if(cb)cb(list);
  });
}
// 특정 지역의 건물 목록
function loadBuildings(region,cb){
  if(!SB_READY||!region){if(cb)cb([]);return;}
  if(BLD_CACHE[region]){if(cb)cb(BLD_CACHE[region]);return;}
  sb.from('fac_campus_buildings').select('building').eq('region',region).then(function(res){
    var rows=(res&&res.data)||[];
    var set={},list=[];
    rows.forEach(function(r){if(r.building&&!set[r.building]){set[r.building]=1;list.push(r.building);}});
    list.sort();
    BLD_CACHE[region]=list;
    if(cb)cb(list);
  });
}
// 특정 지역+건물의 층 목록
function loadFloors(region,building,cb){
  if(!SB_READY||!region){if(cb)cb([]);return;}
  var key=region+'|'+building;
  if(FLR_CACHE[key]){if(cb)cb(FLR_CACHE[key]);return;}
  var q=sb.from('fac_campus_floors').select('floor').eq('region',region);
  if(building)q=q.eq('building',building);
  q.then(function(res){
    var rows=(res&&res.data)||[];
    var set={},list=[];
    rows.forEach(function(r){if(r.floor&&!set[r.floor]){set[r.floor]=1;list.push(r.floor);}});
    // 층수 정렬: 숫자 기준
    list.sort(function(a,b){return (parseInt(a)||0)-(parseInt(b)||0);});
    FLR_CACHE[key]=list;
    if(cb)cb(list);
  });
}
// 드롭다운 옵션을 동적으로 다시 채우기
function fillDDOptions(k,list){
  var box=document.querySelector('.dd[data-k="'+k+'"]');if(!box)return;
  var body=box.querySelector('.ddbody');
  var m=META[k];
  STATE[k]=m.multi?[]:null;
  body.innerHTML=(list&&list.length)?list.map(function(o){return '<button type="button" class="optb" data-v="'+o+'">'+o+'</button>';}).join(''):'<div class="hint" style="padding:4px 2px">'+(k==='building'?'건물 정보 없음':k==='floor'?'층 정보 없음':'불러오는 중...')+'</div>';
  body.querySelectorAll('.optb').forEach(function(b){b.addEventListener('click',function(){
    if(m.multi){b.classList.toggle('on');STATE[k]=[].slice.call(body.querySelectorAll('.optb.on')).map(function(x){return x.dataset.v;});}
    else{body.querySelectorAll('.optb').forEach(function(x){x.classList.remove('on');});b.classList.add('on');STATE[k]=b.dataset.v;box.classList.remove('open');
      if(k==='campus'){lsSet('fac_campus',b.dataset.v);onCampusPicked(b.dataset.v);}
      if(k==='building'){lsSet('fac_building',b.dataset.v);onBuildingPicked(b.dataset.v);}}
    paint(k);
  });});
  paint(k);
}
// 캠퍼스(지역) 선택 시: 건물 로드
function onCampusPicked(region){
  var bb=document.querySelector('.dd[data-k="building"]');if(bb)fillDDOptions('building',[]);
  var fb=document.querySelector('.dd[data-k="floor"]');if(fb)fillDDOptions('floor',[]);
  loadBuildings(region,function(list){fillDDOptions('building',list);});

function autoMatchNotifyEmail(region){
  var inp=document.getElementById('notify_email');var hint=document.getElementById('notify_hint');
  if(!inp||!(CURRENT_USER&&CURRENT_USER.role==='admin')||NOTIFY_TOUCHED||!SB_READY||!region)return;

  sb.from('fac_accounts').select('email,name,login_id').eq('region',region).eq('status','active').not('email','is',null).order('approved_at',{ascending:true}).limit(1).then(function(res){
    var acc=(res.data&&res.data[0])||null;
    if(acc&&acc.email&&!NOTIFY_TOUCHED){inp.value=acc.email;if(hint)hint.innerHTML=region+' 담당자('+(acc.name||acc.login_id)+') 이메일 자동 입력 — 필요시 수정하세요';}

  });
}

function docEsc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function docExt(n){var m=/\.([A-Za-z0-9]{1,8})$/.exec(n||'');return m?m[1].toLowerCase():'bin';}
function docSize(b){b=Number(b||0);if(!b)return '';if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(0)+'KB';return (b/1048576).toFixed(1)+'MB';}
function docById(id){for(var i=0;i<DOCS.length;i++){if(String(DOCS[i].id)===String(id))return DOCS[i];}return null;}
function docIsAdmin(){return !!(CURRENT_USER&&CURRENT_USER.role==='admin');}
// 폴더 정렬 — 최신 년도가 위로 (2026 > 2025), 폴더 없음은 맨 아래
function docFolderSort(a,b){
  if(a===''&&b!=='')return 1; if(b===''&&a!=='')return -1;
  return String(b).localeCompare(String(a),'ko',{numeric:true});
}
// 특정 카테고리에 존재하는 폴더 목록
function docFolders(cat){
  var set={},out=[];
  DOCS.forEach(function(d){
    if(cat!=='전체'&&d.cat!==cat)return;
    var f=d.folder||'';
    if(!(f in set)){set[f]=1;out.push(f);}
  });
  out.sort(docFolderSort);
  return out;
}
function docAllFolders(){
  var set={},out=[];
  DOCS.forEach(function(d){if(d.folder&&!set[d.folder]){set[d.folder]=1;out.push(d.folder);}});
  out.sort(docFolderSort);
  return out;
}

// Blob으로 받아 a.download 로 저장 → 원본 한글 파일명 100% 보존
function docFetchBlob(d){
  return sb.storage.from(DOC_BUCKET).download(d.path).then(function(res){
    if(res.error||!res.data)throw new Error((res.error&&res.error.message)||'파일을 가져오지 못했습니다');
    return res.data;
  });
}
function docSaveBlob(blob,filename){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download=filename||'download'; a.style.display='none';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){URL.revokeObjectURL(url);},4000);
}
function docDownload(id){
  var d=docById(id);
  if(!d||!d.path){alert('아직 파일이 등록되지 않은 항목입니다.');return;}
  var btn=document.getElementById('dbtn_'+id);
  if(btn){btn.disabled=true;btn.textContent='받는 중...';}
  docFetchBlob(d).then(function(blob){
    docSaveBlob(blob,d.file||d.name);
    if(btn){btn.disabled=false;btn.textContent='다운로드';}
  }).catch(function(e){
    if(btn){btn.disabled=false;btn.textContent='다운로드';}
    alert('다운로드 실패\n'+(e.message||String(e)));
  });
}
// 일괄 다운로드 — 순차 처리 (동시 요청 시 브라우저가 뒷건을 취소함)
function docDownloadSel(){
  if(DOC_BUSY)return;
  var ids=[];for(var k in DOC_SEL){if(DOC_SEL[k])ids.push(k);}
  var list=ids.map(docById).filter(function(d){return d&&d.path;});
  if(!list.length){alert('다운로드할 자료를 체크해 주세요.');return;}
  DOC_BUSY=true;
  var done=0,fail=0,names=[];
  function tick(){renderDocBar('<b style="color:var(--blue)">받는 중 '+(done+fail)+'/'+list.length+'</b>'+(fail?(' · <b style="color:var(--dng)">실패 '+fail+'</b>'):''));}
  tick();
  var chain=Promise.resolve();
  list.forEach(function(d){
    chain=chain.then(function(){
      return docFetchBlob(d).then(function(blob){
        docSaveBlob(blob,d.file||d.name);done++;tick();
        return new Promise(function(r){setTimeout(r,350);}); // 브라우저 저장 큐 여유
      }).catch(function(e){fail++;names.push(d.name);tick();});
    });
  });
  chain.then(function(){
    DOC_BUSY=false;
    if(fail){renderDocBar('<b style="color:var(--dng)">'+fail+'건 실패</b> — '+docEsc(names.slice(0,3).join(', '))+(names.length>3?' 외':''));}
    else{DOC_SEL={};renderDocs();renderDocBar('<b style="color:var(--ok)">✓ '+done+'건 저장 완료</b>');}
  });
}

var DOC_AQ="";
var DOC_OPEN={};   // 접기/펼치기 상태 (카테고리·폴더별)
function docAdmMatch(d){
  if(!DOC_AQ)return true;
  var hay=[d.name,d.file,d.note,d.folder,d.cat].join(' ').toLowerCase();
  var ts=DOC_AQ.toLowerCase().split(/\s+/).filter(Boolean);
  for(var i=0;i<ts.length;i++){if(hay.indexOf(ts[i])<0)return false;}
  return true;
}
function docToggle(key){ DOC_OPEN[key]=!DOC_OPEN[key]; renderDocAdmin(); }
function docOpenAll(on){
  if(!on){DOC_OPEN={};}
  else{
    DOC_UPCATS.forEach(function(c){DOC_OPEN['c:'+c]=true;});
    DOCS.forEach(function(d){DOC_OPEN['f:'+d.cat+'|'+(d.folder||'')]=true;});
  }
  renderDocAdmin();
}
function docAccRow(key,label,count,depth,forced){
  var open=forced||!!DOC_OPEN[key];
  var pad=depth?'padding-left:16px;':'';
  return '<div onclick="docToggle(\''+key.replace(/'/g,"\\'")+'\')" style="'+pad+'display:flex;align-items:center;gap:8px;margin:'+(depth?'8px 0 6px':'14px 0 6px')+';padding-top:6px;padding-bottom:6px;'

    +'<span style="font-size:11px;color:var(--mute);width:10px;display:inline-block;transform:rotate('+(open?'90':'0')+'deg);transition:transform .12s">▶</span>'

    +(open?'':'<span class="hint" style="font-size:11px;margin-left:auto;color:var(--mute)">펼치기</span>')
    +'</div>';
}
function renderDocAdmin(){
  var box=document.getElementById('docadmin_list');if(!box)return;
  var cnt=document.getElementById('docadm_cnt');
  var pool=DOCS.filter(docAdmMatch);
  if(cnt)cnt.innerHTML=DOC_AQ?('검색 <b>'+pool.length+'</b>/'+DOCS.length+'건'):('총 <b>'+DOCS.length+'</b>건');
  var dbg=document.getElementById('admc_docs');if(dbg)dbg.textContent=DOCS.length?('('+DOCS.length+')'):'';
  if(!DOCS.length){box.innerHTML='<div class="hint" style="padding:18px;text-align:center;border:1px dashed var(--line);border-radius:8px">등록된 자료가 없습니다. <b>+ 새 자료 추가</b>로 시작하세요.</div>';return;}
  if(!pool.length){box.innerHTML='<div class="hint" style="padding:18px;text-align:center;border:1px dashed var(--line);border-radius:8px"><b>"'+docEsc(DOC_AQ)+'"</b> 검색 결과가 없습니다.</div>';return;}
  var searching=!!DOC_AQ;   // 검색 중에는 결과를 자동으로 펼침
  var h='';
  var cats=DOC_UPCATS.concat([]);
  DOCS.forEach(function(d){if(cats.indexOf(d.cat)<0)cats.push(d.cat);});
  cats.forEach(function(c){
    var inCat=pool.filter(function(d){return d.cat===c;});
    if(!inCat.length)return;
    var ck='c:'+c;
    h+=docAccRow(ck,docEsc(c),inCat.length,0,searching);
    if(!(searching||DOC_OPEN[ck]))return;
    var g={},order=[];
    inCat.forEach(function(d){var f=d.folder||'';if(!(f in g)){g[f]=[];order.push(f);}g[f].push(d);});
    order.sort(docFolderSort);
    var multi=(order.length>1||(order.length===1&&order[0]!==''));
    order.forEach(function(f){
      if(!multi){h+=g[f].map(docAdminCard).join('');return;}
      var fk='f:'+c+'|'+f;
      h+=docAccRow(fk,(f===''?'📁 폴더 없음':'📂 '+docEsc(f)),g[f].length,1,searching);
      if(searching||DOC_OPEN[fk])h+='<div style="padding-left:16px">'+g[f].map(docAdminCard).join('')+'</div>';
    });
  });
  box.innerHTML=h;
}
function docStat(id,html,color){var el=document.getElementById('dstat_'+id);if(el){el.innerHTML=html;el.style.color=color||'';}}

function docUpload(id,inp){
  var f=inp&&inp.files&&inp.files[0];if(!f)return;
  if(!docIsAdmin()){alert('총무기획팀 계정만 업로드할 수 있습니다.');inp.value='';return;}
  if(f.size>DOC_MAXMB*1024*1024){alert(DOC_MAXMB+'MB 이하 파일만 업로드할 수 있습니다. (선택한 파일: '+docSize(f.size)+')');inp.value='';return;}
  var d=docById(id);if(!d){inp.value='';return;}
  var oldPath=d.path;
  var newPath='docs/'+id+'/'+Date.now()+'.'+docExt(f.name);
  var notify=(document.getElementById('dnoti_'+id)||{}).checked;
  inp.disabled=true;
  docStat(id,'업로드 중... ('+docSize(f.size)+')','var(--warn)');
  sb.storage.from(DOC_BUCKET).upload(newPath,f,{upsert:false,contentType:f.type||'application/octet-stream'}).then(function(up){
    if(up.error)throw new Error('업로드 실패: '+up.error.message);
    return sb.from('fac_documents').update({
      file_name:f.name, file_path:newPath, file_size:f.size,
      updated_at:new Date().toISOString(),
      created_by:(CURRENT_USER&&CURRENT_USER.login_id)||null
    }).eq('id',id).select();
  }).then(function(res){
    if(res.error)throw new Error('목록 반영 실패: '+res.error.message);
    if(oldPath&&oldPath!==newPath)sb.storage.from(DOC_BUCKET).remove([oldPath]);
    d.file=f.name;d.path=newPath;d.size=f.size;d.updated=new Date().toISOString().slice(0,10);
    docStat(id,'<b style="color:var(--ok)">✓ 업로드 완료</b> · '+docEsc(f.name)+' ('+docSize(f.size)+')','');
    if(notify){
      n8nNotify({type:'doc_update',doc_id:id,category:d.cat,folder:d.folder||'',name:d.name,file_name:f.name,
        updated_at:d.updated,by:(CURRENT_USER&&CURRENT_USER.name)||''}).then(function(){});
    }
    setTimeout(loadDocs,900);
  }).catch(function(e){
    docStat(id,'<b style="color:var(--dng)">'+docEsc(e.message||String(e))+'</b>','');
    inp.disabled=false;inp.value='';
  });
}

// ===== 카테고리별 파일명 규칙 =====
// 이수증·수료증: 지역_학원명_자료명  (예: 수내_수내캠퍼스_안전교육이수증.pdf)
var DOC_RULE={
  "이수증 및 수료증":{
    guide:'파일명 규칙 — <b>지역_학원명_자료명</b> &nbsp;(예: <code>수내_수내캠퍼스_안전교육이수증.pdf</code>)<br>규칙대로 올리면 자료명이 자동으로 정확히 들어갑니다.',
    test:function(base){
      var p=String(base).split('_');
      if(p.length<3)return '규칙 확인 — 지역_학원명_자료명 형태가 아닙니다';
      if(p.some(function(x){return !x.trim();}))return '규칙 확인 — 비어있는 구간이 있습니다';
      return '';
    }
  }
};
function docRule(){return DOC_RULE[(document.getElementById('dnew_cat')||{}).value]||null;}

var DNEW_FILES=[];
function docBaseName(n){return String(n||'').replace(/\.[A-Za-z0-9]{1,8}$/,'');}
function docAddOpen(){
  DNEW_FILES=[];
  var opts=DOC_UPCATS.map(function(c){return '<option value="'+docEsc(c)+'"'+(c===DOC_FILTER?' selected':'')+'>'+docEsc(c)+'</option>';}).join('');
  openModal('<div class="mh">새 자료 추가</div><div class="mb" style="max-height:62vh;overflow:auto">'
    +'<div class="lbl">카테고리</div><select id="dnew_cat" style="width:100%" onchange="docNewRender()">'+opts+'</select>'
    +'<div id="dnew_rule"></div>'
    +'<div class="lbl" style="margin-top:11px">폴더 (선택 · 년도 구분용)</div>'+docFolderPicker('dnew_folder','')
    +'<div class="lbl" style="margin-top:11px">부가 설명 (선택 · 전체 공통)</div><input type="text" id="dnew_note" placeholder="예: 전 캠퍼스 공통 · 매년 갱신" style="width:100%">'
    +'<div class="lbl" style="margin-top:13px">파일 <span style="font-weight:400;color:var(--mute)">— 여러 개 한 번에 선택할 수 있습니다</span></div>'
    +'<label class="flt" style="cursor:pointer;display:inline-block">+ 파일 선택 (여러 개 가능)<input type="file" id="dnew_file" multiple style="display:none" onchange="docNewFiles(this)"></label>'
    +'<div id="dnew_files" style="margin-top:9px"></div>'
    +'<div id="dnew_solo" style="margin-top:11px"><div class="lbl">자료명 (파일 없이 항목만 만들 때)</div><input type="text" id="dnew_name" placeholder="예: 2026년 통합 보험증권" style="width:100%"></div>'
    +'<div class="hint" id="dnew_msg" style="margin-top:10px;line-height:1.5">파일을 여러 개 고르면 <b>파일 1개당 자료 1건</b>으로 등록되고, 자료명은 파일명이 자동으로 들어갑니다. 아래에서 개별 수정할 수 있습니다.</div>'
    +'</div><div class="mf"><button class="mbtn no" onclick="closeModal()">취소</button><button class="mbtn yes" id="dnew_ok" onclick="docAddSave()">추가</button></div>');
  docNewRender();
}
function docNewFiles(inp){
  var fs=inp.files?Array.prototype.slice.call(inp.files):[];
  fs.forEach(function(f){
    var dup=DNEW_FILES.some(function(x){return x.f.name===f.name&&x.f.size===f.size;});
    if(!dup)DNEW_FILES.push({f:f,name:docBaseName(f.name),err:(f.size>DOC_MAXMB*1024*1024)?('용량 초과 ('+docSize(f.size)+')'):''});
  });
  inp.value='';
  var ok=document.getElementById('dnew_ok');if(ok){delete ok.dataset.warned;ok.textContent='추가';}
  docNewRender();
}
function docNewRemove(i){DNEW_FILES.splice(i,1);docNewRender();}
var __dnT=null;
function docNewName(i,v){if(!DNEW_FILES[i])return;DNEW_FILES[i].name=v;var r=docRule();var st=document.getElementById('dnfs_'+i),row=document.getElementById('dnf_'+i);if(!r||!st||!row)return;var w=DNEW_FILES[i].err?'':r.test(v);DNEW_FILES[i].warn=w;row.style.background=DNEW_FILES[i].err?'var(--dngbg)':(w?'var(--warnbg)':'#fff');st.innerHTML=DNEW_FILES[i].err?('<b style="color:var(--dng)">'+docEsc(DNEW_FILES[i].err)+'</b>'):(w?('<b style="color:var(--warn)">'+docEsc(w)+'</b>'):(docEsc(DNEW_FILES[i].f.name)+' · '+docSize(DNEW_FILES[i].f.size)));}
function docNewRender(){
  var box=document.getElementById('dnew_files');if(!box)return;
  var rule=docRule();
  // 규칙 안내 배너
  var rb=document.getElementById('dnew_rule');
  if(rb)rb.innerHTML=rule?('<div class="hint" style="margin-top:8px;line-height:1.55;border:1px solid var(--bluln,var(--line));background:var(--bluebg);border-radius:7px;padding:9px 11px">'+rule.guide+'</div>'):'';
  // 파일별 규칙 재검사
  DNEW_FILES.forEach(function(x){
    x.err=(x.f.size>DOC_MAXMB*1024*1024)?('용량 초과 ('+docSize(x.f.size)+')'):'';
    x.warn=(!x.err&&rule)?rule.test(x.name):'';
  });
  var solo=document.getElementById('dnew_solo');
  if(solo)solo.style.display=DNEW_FILES.length?'none':'';
  if(!DNEW_FILES.length){box.innerHTML='';return;}
  var bad=DNEW_FILES.filter(function(x){return x.err;}).length;
  var wrn=DNEW_FILES.filter(function(x){return x.warn;}).length;
  var tot=DNEW_FILES.reduce(function(a,x){return a+x.f.size;},0);
  box.innerHTML='<div class="hint" style="margin-bottom:7px">선택 <b>'+DNEW_FILES.length+'건</b> · 합계 '+docSize(tot)
      +(bad?(' · <b style="color:var(--dng)">오류 '+bad+'건</b>'):'')
      +(wrn?(' · <b style="color:var(--warn)">규칙 확인 '+wrn+'건</b>'):'')+'</div>'
    +'<div style="border:1px solid var(--line);border-radius:8px;overflow:hidden">'
    +DNEW_FILES.map(function(x,i){
      var bg=x.err?'var(--dngbg)':(x.warn?'var(--warnbg)':'#fff');
      var right=x.err?('<b style="color:var(--dng)">'+docEsc(x.err)+'</b>')
        :(x.warn?('<b style="color:var(--warn)">'+docEsc(x.warn)+'</b>')
        :(docEsc(x.f.name)+' · '+docSize(x.f.size)));
      return '<div id="dnf_'+i+'" style="display:flex;gap:8px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--line2);background:'+bg+'">'
        +'<input type="text" value="'+docEsc(x.name)+'" oninput="docNewName('+i+',this.value)" style="flex:1;min-width:0;font-size:12.5px;padding:5px 8px">'
        +'<span class="hint" id="dnfs_'+i+'" style="font-size:11.5px;white-space:nowrap;max-width:230px;overflow:hidden;text-overflow:ellipsis">'+right+'</span>'
        +'<button type="button" class="flt" style="padding:2px 8px;font-size:12px;border-color:var(--dngln);color:var(--dng)" onclick="docNewRemove('+i+')">×</button>'
        +'</div>';
    }).join('')+'</div>';
}
function docAddSave(){
  var cat=document.getElementById('dnew_cat').value;
  var folder=(document.getElementById('dnew_folder').value||'').trim();
  var note=(document.getElementById('dnew_note').value||'').trim();
  var msg=document.getElementById('dnew_msg');
  var ok=document.getElementById('dnew_ok');
  if(!docIsAdmin()){msg.innerHTML='<b style="color:var(--dng)">총무기획팀 계정만 등록할 수 있습니다.</b>';return;}

  // 파일 없이 항목만 생성
  if(!DNEW_FILES.length){
    var name=(document.getElementById('dnew_name').value||'').trim();
    if(!name){msg.innerHTML='<b style="color:var(--dng)">파일을 선택하거나 자료명을 입력해 주세요.</b>';return;}
    ok.disabled=true;ok.textContent='저장 중...';
    sb.from('fac_documents').insert({category:cat,folder:folder||null,name:name,note:note,
      created_by:(CURRENT_USER&&CURRENT_USER.login_id)||null}).then(function(res){
      if(res.error){ok.disabled=false;ok.textContent='추가';msg.innerHTML='<b style="color:var(--dng)">등록 실패: '+docEsc(res.error.message)+'</b>';return;}
      closeModal();loadDocs();
    });
    return;
  }

  // 검증
  var bad=DNEW_FILES.filter(function(x){return x.err;});
  if(bad.length){msg.innerHTML='<b style="color:var(--dng)">'+DOC_MAXMB+'MB 초과 파일 '+bad.length+'건을 목록에서 제거해 주세요.</b>';return;}
  var noname=DNEW_FILES.filter(function(x){return !String(x.name||'').trim();});
  if(noname.length){msg.innerHTML='<b style="color:var(--dng)">자료명이 비어있는 항목이 '+noname.length+'건 있습니다.</b>';return;}
  var warns=DNEW_FILES.filter(function(x){return x.warn;});
  if(warns.length&&!ok.dataset.warned){
    ok.dataset.warned='1';ok.textContent='규칙 무시하고 추가';
    msg.innerHTML='<b style="color:var(--warn)">'+warns.length+'건이 파일명 규칙과 다릅니다.</b> 자료명을 고치거나, 그대로 진행하려면 버튼을 한 번 더 누르세요.';
    return;
  }

  ok.disabled=true;
  var total=DNEW_FILES.length,done=0,fail=0;
  function tick(){ok.textContent='업로드 '+(done+fail)+'/'+total;
    msg.innerHTML='업로드 중입니다... <b>'+(done+fail)+'/'+total+'</b>'+(fail?(' · <b style="color:var(--dng)">실패 '+fail+'</b>'):'')+'<br>창을 닫지 마세요.';}
  tick();

  // 순차 업로드 (동시 업로드 시 Storage 레이트리밋 위험 → 1건씩)
  var chain=Promise.resolve();
  DNEW_FILES.forEach(function(x,i){
    chain=chain.then(function(){
      var st=document.getElementById('dnfs_'+i);
      if(st)st.innerHTML='<b style="color:var(--warn)">업로드 중...</b>';
      var newId=null;
      return sb.from('fac_documents').insert({category:cat,folder:folder||null,name:String(x.name).trim(),note:note,
        created_by:(CURRENT_USER&&CURRENT_USER.login_id)||null}).select('id').then(function(res){
        if(res.error)throw new Error('등록 실패: '+res.error.message);
        newId=res.data[0].id;
        var path='docs/'+newId+'/'+Date.now()+'.'+docExt(x.f.name);
        return sb.storage.from(DOC_BUCKET).upload(path,x.f,{upsert:false,contentType:x.f.type||'application/octet-stream'}).then(function(up){
          if(up.error)throw new Error('파일 업로드 실패: '+up.error.message);
          return sb.from('fac_documents').update({file_name:x.f.name,file_path:path,file_size:x.f.size,
            updated_at:new Date().toISOString()}).eq('id',newId);
        });
      }).then(function(){
        done++;if(st)st.innerHTML='<b style="color:var(--ok)">✓ 완료</b>';
        var row=document.getElementById('dnf_'+i);if(row)row.style.background='var(--okbg)';
        tick();
      }).catch(function(e){
        fail++;if(st)st.innerHTML='<b style="color:var(--dng)">'+docEsc(e.message||String(e))+'</b>';
        var row2=document.getElementById('dnf_'+i);if(row2)row2.style.background='var(--dngbg)';
        // 파일은 실패했지만 행이 만들어진 경우 → 빈 항목 정리
        if(newId)sb.from('fac_documents').delete().eq('id',newId);
        tick();
      });
    });
  });
  chain.then(function(){
    if(!fail){closeModal();loadDocs();return;}
    ok.disabled=false;ok.textContent='실패분 재시도';
    // 성공분은 목록에서 제거 → 버튼 다시 누르면 실패분만 재업로드
    DNEW_FILES=DNEW_FILES.filter(function(x,i){
      var st=document.getElementById('dnfs_'+i);
      return !(st&&st.textContent.indexOf('완료')>=0);
    });
    msg.innerHTML='<b style="color:var(--dng)">'+fail+'건 실패</b> · 성공 '+done+'건은 등록되었습니다. 실패한 항목만 남겨두었으니 <b>실패분 재시도</b>를 누르거나 창을 닫으세요.';
    loadDocs();
  });
}

function docDeleteGo(id){
  var d=docById(id);if(!d){closeModal();return;}
  var p=d.path?sb.storage.from(DOC_BUCKET).remove([d.path]):Promise.resolve({});
  p.then(function(){return sb.from('fac_documents').delete().eq('id',id);}).then(function(res){
    closeModal();
    if(res&&res.error)alert('삭제 실패: '+res.error.message);
    loadDocs();
  });
}

// ===== 타 학원 실명·연상 감지 (총무기획팀이 이 목록에 학원명을 추가·관리) =====
var LMS_ACADEMY=["시대인재","메가스터디","강남대성","대성마이맥","러셀","종로학원","이투스","두각","미래탐구","깊은생각","생각하는황소","황소","CMS","파인만","페르마","플라토","지트","수학의아침","청솔","청담어학원","청담러닝","아발론","폴리어학원","정상어학원","토피아","하이스트","에듀플렉스","조재필수학","이강학원"];
var LMS_ACADEMY_EXC={"청솔":["마을","아파트","공원","초등학교","중학교"]}; // 오탐 제외 문맥
var LMS_MASK='[*＊xXｘ○●◯□ㅁㅇ]';
function lmsEscRe(c){return c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
// 학원명 → 원문 + 글자별 마스킹 변형(1글자 마스킹, 4자 이상은 연속 2글자 마스킹 포함) 감지 정규식
function lmsAcadRe(name){
  var ch=name.split(''),alts=[ch.map(lmsEscRe).join('\\s?')];
  for(var i=0;i<ch.length;i++){alts.push(ch.map(function(c,j){return j===i?LMS_MASK:lmsEscRe(c);}).join('\\s?'));}
  if(ch.length>=4){for(var k=0;k<ch.length-1;k++){alts.push(ch.map(function(c,j){return (j===k||j===k+1)?LMS_MASK:lmsEscRe(c);}).join('\\s?'));}}
  return new RegExp('(?:'+alts.join('|')+')','gi');
}

function bindLms(){
  var vt=document.getElementById('lms_type');
  vt.querySelectorAll('.fb').forEach(function(b){b.addEventListener('click',function(){vt.querySelectorAll('.fb').forEach(function(x){x.classList.remove('on');});b.classList.add('on');});});
  var ta=document.getElementById('lms_text');
  ta.addEventListener('input',function(){var by=lmsBytes(ta.value);var el=document.getElementById('lms_bytes');el.textContent=by+' byte · '+(by<=90?'SMS 가능':'LMS(장문)');});
}

function runLms(){
  var t=document.getElementById('lms_text').value;
  var out=document.getElementById('lms_out');
  if(!t.trim()){out.innerHTML='<div class="hint" style="padding:16px;text-align:center;border:1px dashed var(--line);border-radius:10px">검증할 문구를 입력하세요.</div>';return;}
  var isAd=(document.querySelector('#lms_type .fb.on')||{}).dataset?document.querySelector('#lms_type .fb.on').dataset.v==='ad':true;
  var findings=[],ranges=[];
  // 0) 타 학원 실명·마스킹 변형 감지 (사전 기반)
  var acadHits={},acadCnt=0;
  LMS_ACADEMY.forEach(function(nm){
    var re=lmsAcadRe(nm),m2;
    while((m2=re.exec(t))!==null){
      var exc=LMS_ACADEMY_EXC[nm],skip=false;
      if(exc){var tail=t.substr(m2.index+m2[0].length,4);exc.forEach(function(e){if(tail.indexOf(e)===0)skip=true;});}
      if(!skip){if(!acadHits[m2[0]]){acadHits[m2[0]]=1;acadCnt++;}ranges.push([m2.index,m2.index+m2[0].length,'danger']);}
      if(m2.index===re.lastIndex)re.lastIndex++;
    }
  });
  if(acadCnt)findings.push({g:"danger",cat:"타 학원 실명·연상 표기 감지 ("+acadCnt+"건)",law:"표시광고법 제3조(부당 비교·비방)·부정경쟁방지법 제2조",
    msg:"타 학원의 실명 또는 마스킹 표기가 감지되었습니다. 실명·마스킹 여부와 무관하게 특정 학원이 연상되면 공정위 신고(부당 비교·비방 광고) 대상이며, 명예훼손·업무방해에 따른 민사 손해배상 소송으로 이어질 수 있습니다. 발송을 중단하세요.",
    fix:"해당 학원명·연상 표현을 전부 삭제. 비교가 필요하면 「자사 재원생 성과」 등 자사 데이터만 사용",hits:Object.keys(acadHits)});
  // 1) 키워드 규칙
  LMS_KW.forEach(function(r){
    r.re.lastIndex=0;var m,hits=[];
    while((m=r.re.exec(t))!==null){hits.push(m[0]);ranges.push([m.index,m.index+m[0].length,r.g]);if(m.index===r.re.lastIndex)r.re.lastIndex++;}
    if(hits.length)findings.push({g:r.g,cat:r.cat,law:r.law,msg:r.msg,fix:r.fix,hits:hits});
  });
  // 2) 구조 규칙 (광고성일 때)
  if(isAd){
    if(!/\(\s*광\s*고\s*\)/.test(t))findings.unshift({g:"danger",cat:"필수 표기 — (광고) 누락",law:"정보통신망법 제50조",msg:"영리 목적 광고성 문자는 본문 첫머리에 (광고)를 표기해야 합니다. 미표기는 과태료 부과 대상 1순위입니다.",fix:"문자 맨 앞에 「(광고)」 추가",hits:[]});
    if(!/(무료\s*수신\s*거부|수신\s*거부|080[\s\-]?\d{3,4}[\s\-]?\d{4})/.test(t))findings.unshift({g:"danger",cat:"필수 표기 — 무료수신거부 누락",law:"정보통신망법 제50조",msg:"광고 문자에는 수신거부 방법을 무료(080 번호 등)로 안내해야 합니다.",fix:"말미에 「무료수신거부 080-○○○-○○○○」 추가",hits:[]});
    if(!/(학원|교습소|아카데미|어학원|캠퍼스|플로우)/.test(t))findings.push({g:"warn",cat:"전송자 표기 확인",law:"정보통신망법 시행령",msg:"전송자(학원명·연락처)가 문구에서 확인되지 않습니다. 광고에는 전송자 명칭과 연락처를 표기해야 합니다.",fix:"교육청 등록 학원명 + 대표 연락처 표기",hits:[]});
    if(!/(등록|신고)\s*(번호)?\s*:?\s*제?\s*\d|제\s*\d{1,6}\s*호/.test(t))findings.unshift({g:"danger",cat:"학원 등록번호 미표기",law:"학원법 제15조 제3항·시행령 제16조의3",msg:"학습자 모집 광고에는 교육지원청 등록·신고번호를 표시해야 합니다(과태료 대상). 성남·용인·수원 등 경기도 내 교육지원청 지도점검 시 최우선 확인 항목입니다.",fix:"문구에 「○○교육지원청 등록 제○○○○호」 추가",hits:[]});
    if(/(스쿨|아카데미|캠퍼스|칼리지)/.test(t)&&!/(학원|교습소)/.test(t))findings.push({g:"warn",cat:"등록 명칭 미사용",law:"학원법 시행령 제16조의3·경기도 조례 시행규칙 제3조",msg:"광고에는 교육지원청에 등록·신고된 정식 명칭(○○학원/○○교습소)을 사용해야 합니다. 스쿨·아카데미·캠퍼스 등 미등록 명칭만 단독 표기하면 위반 소지가 있습니다.",fix:"등록 명칭을 함께 표기(예: 「플로우○○학원(브랜드명: ○○캠퍼스)」)",hits:[]});
    if(/\d[\d,]*\s*원|수강료|교습비|특강비/.test(t))findings.push({g:"warn",cat:"교습비 표시 검증 필요",law:"학원법 제15조 제3항·경기도 조례 시행규칙 제8조의2",msg:"광고에 금액을 표시할 경우 교육지원청에 등록된 교습비와 일치해야 하며, 교습비와 기타경비(모의고사비·재료비·차량비 등)를 구분해 표시해야 합니다. 등록 금액 초과 표시·수납은 행정처분 대상입니다.",fix:"등록 교습비 원장 대조 후 발송, 기타경비는 별도 항목으로 구분 표기",hits:[]});
    var tm=document.getElementById('lms_time').value;
    if(tm){var h=parseInt(tm.split(':')[0],10);if(h>=21||h<8)findings.unshift({g:"danger",cat:"야간 발송 시간",law:"정보통신망법 제50조 제3항",msg:"21시~익일 8시 광고 전송은 수신자의 별도 사전 동의가 필요합니다. 야간 발송은 민원 발생률이 가장 높습니다.",fix:"발송 시각을 08:00~20:59로 조정하거나 야간수신 동의자만 발송",hits:[]});}
    var tg=document.getElementById('lms_target').value;
    if(tg==='noopt')findings.unshift({g:"danger",cat:"수신 동의 미확인",law:"정보통신망법 제50조 제1항",msg:"광고성 정보는 사전 수신 동의자에게만 전송할 수 있습니다(옵트인). 동의 이력이 불명확한 대상 발송은 과태료·민원 리스크가 가장 큽니다.",fix:"발송 리스트를 수신 동의자(동의 일시 기록 보유)로 한정",hits:[]});
  }
  // 하이라이트
  ranges.sort(function(a,b){return a[0]-b[0];});
  var merged=[];ranges.forEach(function(r){var L=merged[merged.length-1];if(L&&r[0]<=L[1]){L[1]=Math.max(L[1],r[1]);if(r[2]==='danger')L[2]='danger';}else merged.push([r[0],r[1],r[2]]);});
  var hl='',last=0;
  merged.forEach(function(r){var col=r[2]==='danger'?'background:var(--dngbg);color:var(--dng);border-bottom:2px solid var(--dng)':'background:var(--warnbg);color:var(--warn);border-bottom:2px solid var(--warn)';hl+=lmsEsc(t.slice(last,r[0]))+'<mark style="'+col+';border-radius:3px;padding:0 2px;font-weight:600">'+lmsEsc(t.slice(r[0],r[1]))+'</mark>';last=r[1];});
  hl+=lmsEsc(t.slice(last));hl=hl.replace(/\n/g,'<br>');
  // 판정
  var nd=findings.filter(function(f){return f.g==='danger';}).length;
  var nw=findings.filter(function(f){return f.g==='warn';}).length;
  var verdict,vc;
  if(nd){verdict='발송 보류 — 수정 필요 ('+nd+'건)';vc=['var(--dngln)','var(--dngbg)','var(--dng)'];}
  else if(nw){verdict='수정 후 발송 권장 ('+nw+'건 확인)';vc=['var(--warnln)','var(--warnbg)','var(--warn)'];}
  else{verdict='1차 검증 통과 (자동 점검 기준)';vc=['var(--okln)','var(--okbg)','var(--ok)'];}
  var h='<div style="border:1px solid '+vc[0]+';background:'+vc[1]+';border-radius:12px;padding:15px 18px;margin-bottom:14px"><div style="font-size:15px;font-weight:700;color:'+vc[2]+'">'+verdict+'</div><div class="hint" style="margin-top:4px">위험 '+nd+'건 · 주의 '+nw+'건 · 자동 검증은 1차 참고용입니다.</div></div>';
  if(merged.length){h+='<div class="panel" style="max-width:none;margin-top:0;margin-bottom:14px"><div class="ph" style="font-size:14px">문구 미리보기 (문제 구간 표시)</div><div class="pb" style="font-size:13.5px;line-height:1.8">'+hl+'</div></div>';}
  findings.forEach(function(f){
    var c=f.g==='danger'?['var(--dngln)','var(--dngbg)','var(--dng)','발송 보류']:['var(--warnln)','var(--warnbg)','var(--warn)','수정 권장'];
    h+='<div style="border:1px solid '+c[0]+';border-radius:10px;padding:13px 15px;margin-bottom:9px;background:#fff">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap"><b style="font-size:13.5px">'+f.cat+'</b><span style="font-size:11px;font-weight:600;color:'+c[2]+';background:'+c[1]+';border:1px solid '+c[0]+';border-radius:5px;padding:1px 8px">'+c[3]+'</span><span class="pill">'+f.law+'</span></div>'
      +(f.hits.length?'<div style="font-size:12.5px;margin-bottom:6px"><span style="color:var(--mute)">감지 문구 · </span><b>'+f.hits.slice(0,5).map(lmsEsc).join('</b>, <b>')+'</b></div>':'')
      +'<div style="font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:6px">'+f.msg+'</div>'
      +'<div style="font-size:12.5px;color:var(--ink2);background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:8px 11px"><b>수정 제안</b> · '+f.fix+'</div></div>';
  });
  if(!findings.length)h+='<div class="hint" style="padding:14px;border:1px dashed var(--okln);border-radius:10px;line-height:1.6">자동 점검 항목에서 문제가 발견되지 않았습니다. 다만 합격 실적·가격 등 <b>사실 주장</b>이 포함되어 있다면 증빙자료 보유 여부를 최종 확인하세요.</div>';
  out.innerHTML=h;out.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('ovl').classList.add('show');}
function closeModal(){document.getElementById('ovl').classList.remove('show');}
function esc(v){return (v==null?'':String(v));}
// 요약 확인 모달: rows=[[label,value],...], title, onYes()
window.__yes=null;
function confirmSubmit(title, rows, onYes){
  var body=rows.filter(function(r){return r[1]!==undefined&&r[1]!==null&&r[1]!=='';}).map(function(r){return '<div class="mrow"><span class="mk">'+r[0]+'</span><span class="mv">'+esc(r[1])+'</span></div>';}).join('');
  window.__yes=onYes;
  openModal('<div class="mh">'+title+'</div><div class="mb">'+body+'<div class="mq">위 건으로 접수하시겠습니까?</div></div><div class="mf"><button class="mbtn no" onclick="closeModal()">아니오</button><button class="mbtn yes" onclick="(window.__yes&&window.__yes());">예</button></div>');
}
function submitDone(msg){
  var isErr=/오류|실패|연결되어 있지 않|선택해 주세요|입력해 주세요/.test(msg);
  var ic=isErr
    ? '<div class="done-ic" style="background:var(--dngbg);border-color:var(--dngln);color:var(--dng)">!</div><div style="font-size:14px;font-weight:600;margin-bottom:5px">처리하지 못했습니다</div>'
    : '<div class="done-ic">✓</div><div style="font-size:14px;font-weight:600;margin-bottom:5px">접수되었습니다</div>';
  openModal('<div class="mb" style="text-align:center;padding-top:22px">'+ic+'<div class="hint" style="font-size:12.5px;line-height:1.5">'+msg+'</div></div><div class="mf"><button class="mbtn yes" onclick="closeModal()">확인</button></div>');
}
// 드롭다운 다중/단일 값 읽기
function selVal(k){var v=STATE[k];if(v==null)return '';return Array.isArray(v)?v.join(', '):v;}
function fieldVal(id){var el=document.getElementById(id);return el?el.value:'';}

// 유지보수 접수 제출
// ===== Supabase 저장 =====
function arrOrNull(v){return (Array.isArray(v)&&v.length)?v:null;}
function saveRequest(type, extra, okMsg){
  if(!SB_READY){submitDone('저장 서버에 연결되어 있지 않습니다. 잠시 후 다시 시도해 주세요.');return;}
  var row=Object.assign({
    type:type,
    biz:arrOrNull(STATE.biz), brand:arrOrNull(STATE.brand),
    campus:STATE.campus||'', building:STATE.building||null,
    floors:arrOrNull(STATE.floor),
    applicant:'', apply_date:null, status:'wait',
    applicant_login:(CURRENT_USER&&CURRENT_USER.login_id)||null
  }, extra);
  if(!row.campus){submitDone('캠퍼스(지역)를 선택해 주세요.');return;}
  if(!row.applicant){submitDone('신청자 이름을 입력해 주세요.');return;}
  sb.from('fac_requests').insert(row).select('id,record_no').then(function(res){
    if(res.error){submitDone('저장 중 오류가 발생했습니다: '+res.error.message);return;}
    var rec=(res.data&&res.data[0])||{};var no=rec.record_no||'';
    fireReceipt(type,rec.id,okMsg+(no?('<br><br>접수번호: <b>'+no+'</b>'):''),no);
  });
}
// 접수 완료 알림(접수자+총무팀) 발송 후 완료 모달
function fireReceipt(kind,id,baseMsg,no){
  var email=(CURRENT_USER&&CURRENT_USER.email)||null;
  var sm=collectSummary(kind,no);
  n8nNotify({type:'received',kind:kind,id:id,record_no:no||'',applicant_email:email,
    applicant_name:(CURRENT_USER&&CURRENT_USER.name)||'',summary:sm}).then(function(r){
    var note;
    if(r&&r.ok)note='<b style="color:var(--ok)">접수 완료 알림을 발송했습니다.</b> (접수자·총무기획팀)';
    else if(r&&r.error==='n8n_url_not_set')note='<span style="color:var(--warn)">알림 채널(n8n) 연결 전이라 메일은 발송되지 않았습니다. 접수는 정상 저장되었습니다.</span>';
    else note='<span style="color:var(--dng)">접수 알림 발송 실패 — 접수는 정상 저장되었습니다.</span>';
    submitDone(baseMsg+'<br><br>'+note);
  });
}
// 접수 요약: 메일 본문에 넣을 핵심 필드 수집
// 접수 유형 라벨 (진행 알림의 typelabel 과 동일 규격)
var RECV_TYPE_LABEL={fix:'유지보수', buy:'구매', rent:'렌탈', pen:'볼펜', voice:'건의'};
function collectSummary(kind, no){
  var s={};
  // ── 기존 필드 (n8n '접수 메일 구성'이 사용 중 — 절대 제거 금지)
  s.campus=STATE.campus||'';
  s.building=STATE.building||'';
  s.floors=(Array.isArray(STATE.floor)?STATE.floor.join(', '):STATE.floor)||'';
  s.reqtype=STATE.reqtype||'';
  if(kind==='fix'){s.detail=fieldVal('detail')||'';s.location=fieldVal('loc')||'';s.applicant=fieldVal('applicant')||'';s.phone=fieldVal('phone')||'';}
  else if(kind==='pen'){s.qty=STATE.penqty?(STATE.penqty+'봉지'):'';s.visit=fieldVal('pvisit')||'';s.applicant=fieldVal('papplicant')||'';}
  else if(kind==='voice'){s.vtype=VOICE_TYPE;s.title=fieldVal('vtitle')||'';s.content=fieldVal('vcontent')||'';s.applicant=fieldVal('vapplicant')||'';}
  else {s.applicant=fieldVal('applicant')||'현장';}

  // ── 추가 필드 (진행 알림 progressSummary 와 동일한 이름 규격)
  s.record_no = no||'';                                   // DB가 발급한 접수번호
  s.typelabel = RECV_TYPE_LABEL[kind]||kind||'';
  s.subtype   = (kind==='voice') ? (VOICE_TYPE||'') : (STATE.reqtype||'');
  s.status    = '접수 대기';
  s.received  = new Date().toISOString().slice(0,10);
  s.applicant_login = (CURRENT_USER&&CURRENT_USER.login_id)||'';
  s.updated_by = (CURRENT_USER&&CURRENT_USER.name)||'';
  s.updated_at = new Date().toISOString().slice(0,16).replace('T',' ');
  s.portal_url = location.origin+location.pathname;
  if(!s.title) s.title = [s.campus, s.building].filter(Boolean).join(' ') + (s.subtype?(' · '+s.subtype):'');
  if(!s.detail) s.detail = (kind==='voice') ? (s.content||'') : (s.qty||s.reqtype||'');
  // Slack Workflow Builder 는 undefined 를 무음 실패시킴 → 전 필드 문자열 보장
  Object.keys(s).forEach(function(k){ if(typeof s[k]!=='string')s[k]=String(s[k]==null?'':s[k]); });
  var head=[s.campus,s.building].filter(Boolean).join(' ');
  s.headline=(s.typelabel+' · '+(head||'-')+' · '+(s.title||s.detail.slice(0,30)||'-')).slice(0,140);
  s.changed='신규 접수 · 신청자 '+(s.applicant||'-');
  return s;
}
function saveVoiceRow(okMsg){

    var gwan=fieldVal('akaGwan'),nm=fieldVal('akaName'),rl=fieldVal('akaRole'),perm=fieldVal('vcontent');

    row={vtype:'aka', campus:STATE.campus||null, building:null,

  } else {

    fireReceipt('voice',rec.id,okMsg+(no?('<br><br>접수번호: <b>'+no+'</b>'):''),no);
  });
}

// 볼펜 신청 제출
function submitPen(){
  var qty=STATE.penqty?(STATE.penqty+'봉지 ('+(Number(STATE.penqty)*200).toLocaleString()+'자루)'):'';

// 구매/렌탈 신청 제출
function submitItem(kind, name, opts){
  var rows=[['구분',kind],['품목',name]].concat(opts||[]);
  var qtyEl=document.getElementById('qty');if(qtyEl)rows.push(['수량',qtyEl.value]);
  var type=(kind==='렌탈')?'rent':'buy';
  var pay={item:name}; (opts||[]).forEach(function(o){pay[o[0]]=o[1];}); if(qtyEl)pay.qty=Number(qtyEl.value)||1;
  confirmSubmit(kind+' 신청 확인', rows, function(){saveRequest(type,{
    applicant:fieldVal('applicant')||'현장', reqtype:(kind==='렌탈'?'렌탈자산':'구매요청'), payload:pay
  },'신청되었습니다. 총무기획팀이 견적을 확인해 회신합니다. <b>내 접수내역 조회</b>에서 확인할 수 있습니다.');});
}

  document.querySelectorAll('.admsec').forEach(function(el){el.style.display=(el.dataset.t===t)?'':'none';});

function admSt(v){
  ADM_ST=v;
  document.querySelectorAll('.admsec[data-t="work"] .flt[data-s]').forEach(function(b){b.classList.toggle('on',b.dataset.s===v);});
  filterAdmRows();

// 접수 처리 목록 검색·상태 필터
function filterAdmRows(){
  var box=document.getElementById('adm_rows');if(!box)return;
  var cards=box.children, shown=0;
  for(var i=0;i<cards.length;i++){
    var c=cards[i], rec=SAMPLE[Number(c.dataset.i)]||{};
    var ok=true;
    if(ADM_ST!=='all'&&rec.st!==ADM_ST)ok=false;
    if(ok&&ADM_Q){
      var hay=[rec.rid,rec.campus,rec.building,rec.title,rec.applicant,rec.req,rec.tt].join(' ').toLowerCase();
      var ts=ADM_Q.toLowerCase().split(/\s+/).filter(Boolean);
      for(var j=0;j<ts.length;j++){if(hay.indexOf(ts[j])<0){ok=false;break;}}
    }
    c.style.display=ok?'':'none'; if(ok)shown++;
  }
  var e=document.getElementById('adm_empty');if(e)e.style.display=shown?'none':'';
  var cnt=document.getElementById('adm_cnt');
  if(cnt)cnt.innerHTML=(ADM_Q||ADM_ST!=='all')?('<b>'+shown+'</b>/'+cards.length+'건'):('총 <b>'+cards.length+'</b>건');
  var w=document.getElementById('admc_work');
  if(w){var n=SAMPLE.filter(function(r){return r.st!=='done';}).length;w.textContent=n?('('+n+')'):'';}
}

function loadPending(){
  var box=document.getElementById('approve_list');if(!box)return;
  if(!SB_READY){box.innerHTML='<div class="hint" style="padding:14px">서버 연결 없음</div>';return;}
  sb.from('fac_accounts').select('*').eq('status','pending').order('requested_at',{ascending:true}).then(function(res){
    var rows=(res.data)||[];
    var ab=document.getElementById('admc_acct');
    if(ab){ab.textContent=rows.length?('· 승인대기 '+rows.length):''; ab.style.color=rows.length?'var(--dng)':'';}
    if(!rows.length){box.innerHTML='<div class="hint" style="padding:14px;border:1px dashed var(--line);border-radius:10px;text-align:center">대기 중인 가입 신청이 없습니다.</div>';return;}
    box.innerHTML=rows.map(function(a){
      return '<div class="card"><div style="padding:14px 16px">'
        +'<div class="title" style="margin-bottom:3px">'+a.login_id+'</div>'
        +'<div class="rid" style="margin-bottom:7px">'+(a.region||'')+' · 관코드 '+(a.gwan_code||'')+' · '+(a.name||'')+' · 신청 '+((a.requested_at||'').slice(0,10))+'</div>'
        +'<div style="margin-bottom:11px;font-size:12.5px"><span style="color:var(--mute)">알림 이메일 · </span>'+(a.email?('<b style="color:var(--ink)">'+a.email+'</b>'):'<span style="color:var(--dng)">미입력</span>')+'</div>'
        +'<div style="display:flex;gap:9px;align-items:flex-end">'
        +'<div style="flex:1"><div class="lbl">비밀번호 지정</div><input type="text" data-ap="pw" data-id="'+a.login_id+'" placeholder="6자 이상 (현장에 전달할 비번)"></div>'
        +'<button class="submit" onclick="approveAcct(\''+a.login_id+'\')">승인</button>'
        +'<button class="flt" onclick="rejectAcct(\''+a.login_id+'\')">거절</button>'
        +'</div>'
        +'<div class="hint" style="margin-top:8px">승인하면 즉시 로그인 가능합니다. 지정한 비밀번호를 현장에 전달하세요.</div>'
        +'</div></div>';
    }).join('');
  });
}
function approveAcct(loginId){
  var pw=(document.querySelector('input[data-ap="pw"][data-id="'+loginId+'"]').value||'').trim();
  if(pw.length<6){alert('비밀번호를 6자 이상 입력하세요.');return;}
  if(!SB_READY)return;
  var btnMsg='승인 처리 중...';
  sb.functions.invoke('approve-account',{body:{login_id:loginId,password:pw,approved_by:(CURRENT_USER&&CURRENT_USER.login_id)||'admin'}}).then(function(res){
    if(res.error){alert('오류: '+(res.error.message||res.error));return;}
    var d=res.data;
    if(d&&d.ok){submitDone(loginId+' 계정이 승인되었습니다. 지정한 비밀번호로 즉시 로그인할 수 있습니다.<br><br>현장에 전달할 정보:<br>아이디 <b>'+loginId+'</b> / 비번 <b>'+pw+'</b>');loadPending();}
    else{alert((d&&d.error)||'승인 실패');}
  });
}
function rejectAcct(loginId){
  if(!confirm(loginId+' 가입 신청을 거절할까요?'))return;
  if(!SB_READY)return;
  sb.from('fac_accounts').update({status:'rejected'}).eq('login_id',loginId).then(function(res){
    if(res.error){alert('거절 처리 오류: '+res.error.message);return;}
    loadPending();
  });
}
var ACCOUNTS_CACHE=[];

  var box=document.getElementById('account_list');if(!box)return;
  if(!SB_READY){box.innerHTML='<div class="hint" style="padding:14px">서버 연결 없음</div>';return;}
  sb.from('fac_accounts').select('*').eq('status','active').order('approved_at',{ascending:false}).then(function(res){
    ACCOUNTS_CACHE=(res.data)||[];
    renderAccounts(ACCOUNTS_CACHE);
  });
}

  var missing=rows.filter(function(a){return !a.email;}).length;
  var warn=missing?('<div class="hint" style="margin-bottom:10px;padding:9px 12px;border:1px solid var(--warnln);background:var(--warnbg);border-radius:9px;color:var(--warn)">이메일 미입력 <b>'+missing+'명</b> — 미입력 계정은 접수·진행 알림을 받지 못합니다. 이메일을 등록해 주세요.</div>'):'';
  var head='<div style="display:grid;grid-template-columns:1.3fr 1fr 0.7fr 2fr 0.9fr;gap:10px;padding:9px 12px;font-size:12px;font-weight:600;color:var(--mute);border-bottom:1px solid var(--line)"><div>아이디</div><div>이름</div><div>지역</div><div>알림 이메일 (클릭해 등록·수정)</div><div>승인일</div></div>';
  var body=rows.map(function(a){
    var role=a.role==='admin'?' <span style="font-size:10px;color:var(--blue);border:1px solid var(--blue);border-radius:4px;padding:0 4px">관리자</span>':'';
    var id=a.login_id;
    var emCell='<div style="display:flex;align-items:center;gap:6px">'
      +'<input type="email" data-em-id="'+id+'" value="'+(a.email||'')+'" placeholder="이메일 미입력 — 등록" style="flex:1;padding:6px 9px;font-size:12px;border:1px solid '+(a.email?'var(--line)':'var(--warnln)')+';border-radius:8px;background:'+(a.email?'#fff':'var(--warnbg)')+'">'
      +'<button class="flt" data-em-save="'+id+'" style="padding:6px 11px;white-space:nowrap">'+(a.email?'수정':'등록')+'</button></div>';
    return '<div style="display:grid;grid-template-columns:1.3fr 1fr 0.7fr 2fr 0.9fr;gap:10px;padding:9px 12px;font-size:12.5px;border-bottom:1px solid var(--line);align-items:center">'
      +'<div style="font-weight:600">'+a.login_id+role+'</div>'
      +'<div>'+(a.name||'')+'</div>'
      +'<div>'+(a.region||'')+'</div>'
      +emCell
      +'<div style="color:var(--mute)">'+((a.approved_at||'').slice(0,10))+'</div>'
      +'</div>';
  }).join('');
  box.innerHTML=warn+'<div style="border:1px solid var(--line);border-radius:12px;overflow:hidden">'+head+body+'</div>';
  box.querySelectorAll('[data-em-save]').forEach(function(btn){btn.addEventListener('click',function(){saveEmail(btn.dataset.emSave);});});
  box.querySelectorAll('[data-em-id]').forEach(function(inp){inp.addEventListener('keydown',function(e){if(e.key==='Enter')saveEmail(inp.dataset.emId);});});
}
function saveEmail(loginId){
  var inp=document.querySelector('[data-em-id="'+loginId+'"]');if(!inp)return;
  var email=(inp.value||'').trim();
  if(email&&!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){inp.style.borderColor='var(--dng)';inp.focus();return;}
  if(!SB_READY){submitDone('서버에 연결되어 있지 않습니다.');return;}

// Slack Workflow Builder 요구사항: 평면 구조 + 모든 값 문자열(undefined 금지)
function statusLabel(rec){
  var v=rec.st;
  if(rec.type==='voice')return v==='done'?'답변 완료':v==='prog'?'확인 중':'접수 대기';
  return v==='done'?'완료':v==='prog'?'진행중':'접수 대기';
}
function clean(v){var x=(v==null||v==='-')?'':String(v);return x.trim();}
// 진행상황 요약 — 메일 본문 + 슬랙 메시지 공용
function progressSummary(rec){
  var isVoice=(rec.type==='voice');
  var s={
    record_no  : clean(rec.rid),
    typelabel  : clean(rec.tt)||(isVoice?'건의':'접수'),
    subtype    : clean(rec.vtype)||clean(rec.req),
    title      : clean(rec.title),
    campus     : clean(rec.campus),
    building   : clean(rec.building),
    applicant  : clean(rec.applicant),
    received   : clean(rec.when),
    detail     : isVoice?clean(rec.content):clean(rec.detail),
    location   : isVoice?'':clean(rec.location),
    status     : statusLabel(rec),
    progress   : isVoice?'':clean(rec.prog),
    plan_date  : isVoice?'':clean(rec.plan),
    reply      : isVoice?clean(rec.reply):'',
    updated_by : clean(CURRENT_USER&&CURRENT_USER.name),
    updated_at : new Date().toISOString().slice(0,16).replace('T',' '),
    portal_url : location.origin+location.pathname
  };
  // 슬랙 변수는 빈 문자열도 허용하지만 undefined는 무음 실패 → 전 필드 문자열 보장
  Object.keys(s).forEach(function(k){ if(typeof s[k]!=='string')s[k]=String(s[k]==null?'':s[k]); });
  // 슬랙 한 줄 요약 (워크플로에서 변수 하나만 써도 되도록)
  var head=[s.campus,s.building].filter(Boolean).join(' ');
  s.headline=(s.typelabel+' · '+(head||'-')+' · '+(s.title||s.detail.slice(0,30)||'-')).slice(0,140);
  s.changed=isVoice?('답변 등록: '+(s.reply||'(내용 없음)')):('진행사항: '+(s.progress||'(미입력)')+(s.plan_date?(' / 처리예정 '+s.plan_date):''));
  return s;
}
function notifyApplicant(kind,id,baseMsg,rec){
  var sm=rec?progressSummary(rec):{};
  n8nNotify({type:'progress',kind:kind,id:id,summary:sm,
    applicant_name:sm.applicant||'',record_no:sm.record_no||''}).then(function(d){
    var note=(d&&d.ok)?'<b style="color:var(--ok)">접수자'+(d.to?('('+maskEmail(d.to)+')'):'')+'에게 진행상황 알림을 발송했습니다.</b>'
      :(d&&d.error==='no_email')?'<span style="color:var(--warn)">접수자 이메일이 미등록이라 알림은 발송되지 않았습니다. (승인된 계정 목록에서 확인)</span>'
      :(d&&d.error==='n8n_url_not_set')?'<span style="color:var(--warn)">알림 채널(n8n) 연결 전이라 메일은 발송되지 않았습니다. 저장은 완료되었습니다.</span>'
      :'<span style="color:var(--dng)">알림 발송 실패'+(d&&d.error?(': '+d.error):'')+' — 저장은 완료되었습니다.</span>';
    submitDone(baseMsg+'<br><br>'+note);
  });
}

// login_id → Auth 이메일 (한글 등 비ASCII를 hex로 안전 변환; 영문/숫자/._-는 유지)
function toAuthEmail(loginId){
  var local=String(loginId||'').split('').map(function(ch){
    if(/[A-Za-z0-9._\-]/.test(ch))return ch;
    // 비ASCII → 유니코드 코드포인트 hex (x붙여 구분)
    return 'x'+ch.charCodeAt(0).toString(16);
  }).join('');
  return local+DOMAIN;
}

function doSignup(){

function doLogin(){
  var id=(document.getElementById('li_id').value||'').trim();

  if(!id||!pw){gateMsg('아이디와 비밀번호를 입력하세요.','err');return;}
  if(!SB_READY){gateMsg('서버에 연결되어 있지 않습니다.','err');return;}
  sb.auth.signInWithPassword({email:toAuthEmail(id),password:pw}).then(function(res){
    if(res.error){gateMsg('로그인 실패: 아이디·비밀번호를 확인하세요. (승인 전이면 로그인할 수 없습니다)','err');return;}
    afterLogin(id);
  });

function afterLogin(knownLoginId){
  if(!SB_READY){enterApp();return;}
  sb.auth.getUser().then(function(u){
    var email=(u&&u.data&&u.data.user&&u.data.user.email)||'';
    // 로그인 직후엔 입력 아이디를, 세션복구 시엔 auth_uid로 계정을 찾는다
    var authUid=(u&&u.data&&u.data.user&&u.data.user.id)||'';
    var q=knownLoginId?sb.from('fac_accounts').select('*').eq('login_id',knownLoginId).limit(1):sb.from('fac_accounts').select('*').eq('auth_uid',authUid).limit(1);
    q.then(function(res){
      var acc=(res.data&&res.data[0])||null;
      if(!acc){gateMsg('계정 정보를 찾을 수 없습니다.','err');return;}
      if(acc.status!=='active'){gateMsg('아직 승인되지 않은 계정입니다.','err');sb.auth.signOut();return;}
      CURRENT_USER={login_id:acc.login_id,role:acc.role,region:acc.region,name:acc.name,gwan_code:acc.gwan_code,email:acc.email||null};
      if(acc.must_reset){showForceReset();return;}
      enterApp();
    });
  });
}

  openModal('<div class="mb" style="padding:22px 22px 8px">'
    +'<div style="font-size:16px;font-weight:600;margin-bottom:4px">비밀번호 변경</div>'
    +'<div class="hint" style="margin-bottom:16px">새 비밀번호를 입력하세요. 변경 후 다음 로그인부터 적용됩니다.</div>'
    +'<div class="gate-fld"><label>새 비밀번호</label><input id="pw_new" type="password" placeholder="6자 이상"></div>'
    +'<div class="gate-fld"><label>새 비밀번호 확인</label><input id="pw_new2" type="password" placeholder="다시 입력"></div>'
    +'<div id="pw_msg"></div>'
    +'</div><div class="mf"><button class="mbtn no" onclick="closeModal()">취소</button><button class="mbtn yes" onclick="doPwChange()">변경</button></div>');
}
function doPwChange(){
  var n1=document.getElementById('pw_new').value||'';
  var n2=document.getElementById('pw_new2').value||'';
  var m=document.getElementById('pw_msg');
  function err(t){if(m)m.innerHTML='<div class="gate-msg err" style="margin-top:0">'+t+'</div>';}
  if(n1.length<6){err('비밀번호는 6자 이상이어야 합니다.');return;}
  if(n1!==n2){err('두 비밀번호가 일치하지 않습니다.');return;}
  if(!SB_READY){err('서버에 연결되어 있지 않습니다.');return;}
  sb.auth.updateUser({password:n1}).then(function(res){
    if(res.error){err('변경 실패: '+res.error.message);return;}
    closeModal();
    submitDone('비밀번호가 변경되었습니다. 다음 로그인부터 새 비밀번호를 사용하세요.');
  });
}
function doLogout(){
  if(SB_READY)sb.auth.signOut();
  CURRENT_USER=null;
  document.getElementById('app').style.display='none';
  document.getElementById('gate').style.display='flex';
  var seg=document.querySelector('.gate-seg');if(seg)seg.style.display='';
  var h2=document.querySelector('.gate-card h2');if(h2)h2.textContent='캠퍼스 시설지원 포털';
  var sub=document.querySelector('.gate-card .sub');if(sub)sub.textContent='플로우교육 총무기획팀';
  gateMode('login');
}
function buildTabs(){
  var tabs=document.getElementById('tabs');tabs.innerHTML='';
  var list=TABS.filter(function(t){return t[0]!=='admin'||(CURRENT_USER&&CURRENT_USER.role==='admin');});
  list.forEach(function(t){var b=document.createElement('button');b.className='tn';b.dataset.v=t[0];b.textContent=t[1];b.onclick=function(){render(t[0]);};tabs.appendChild(b);});
  // 계정 바(로그아웃)
  var hd=document.querySelector('.hd');
  if(hd&&!document.getElementById('acctbar')){
    var bar=document.createElement('div');bar.id='acctbar';bar.className='acctbar';bar.style.cssText='position:absolute;top:26px;right:32px';
    hd.style.position='relative';
    hd.appendChild(bar);
  }
  var bar=document.getElementById('acctbar');
  if(bar&&CURRENT_USER){bar.innerHTML='<span><b>'+(CURRENT_USER.name||CURRENT_USER.login_id)+'</b>'+(CURRENT_USER.region?(' · '+CURRENT_USER.region):'')+(CURRENT_USER.role==='admin'?' · 관리자':'')+'</span><button class="logout" onclick="openPwChange()">비밀번호 변경</button><button class="logout" onclick="doLogout()">로그아웃</button>';}
}
// 부팅: 기존 세션 있으면 바로 입장, 없으면 게이트
gateMode('login');
if(SB_READY){
  sb.auth.getSession().then(function(res){
    if(res&&res.data&&res.data.session){afterLogin();}
  });
}
</script>
